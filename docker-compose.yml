services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB__USER}
      POSTGRES_PASSWORD: ${DB__PASSWORD}
      POSTGRES_DB: ${DB__NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J__USER:-neo4j}/${NEO4J__PASSWORD:-neo4jpassword}
      NEO4J_server_default__listen__address: 0.0.0.0
      NEO4J_server_bolt_advertised__address: neo4j:7687
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -a bolt://localhost:7687 -u ${NEO4J__USER:-neo4j} -p ${NEO4J__PASSWORD:-neo4jpassword} 'RETURN 1;'",
        ]
      interval: 10s
      timeout: 10s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO__ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO__SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO__ACCESS_KEY: ${MINIO__ACCESS_KEY:-minioadmin}
      MINIO__SECRET_KEY: ${MINIO__SECRET_KEY:-minioadmin}
      MINIO__BUCKET_NAME: ${MINIO__BUCKET_NAME:-documents}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO__ACCESS_KEY} $${MINIO__SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO__BUCKET_NAME};
      "
    restart: "no"

  migrate:
    build: .
    env_file: .env
    command: alembic upgrade head
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - rag_storage_data:/app/rag_storage
    depends_on:
      db:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_started

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  minio_data:
  rag_storage_data:
